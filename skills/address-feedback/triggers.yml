triggers:
  command_prefixes:
    - "/address-feedback"
  keywords:
    - { term: "feedback", weight: 0.5 }
    - { term: "pr", weight: 0.5 }
    - { term: "loop", weight: 0.5 }
    - { term: "unattended", weight: 0.5 }
    - { term: "review", weight: 0.25 }
    - { term: "merge", weight: 0.25 }
  keyword_groups:
    # AND-group: continuous/unattended intent + PR-feedback noun. Distinguishes
    # this loop skill from the one-pass sibling gh-pr-review-address, which owns
    # the plain "address my PR feedback" intent. This skill wins only when a
    # loop / until-done / auto-merge signal co-occurs with a PR-feedback noun.
    # Group multiplier 1.0 (match.py:92).
    - slots:
        - {
            name: continuous,
            terms: [loop, unattended, until, keep, drive, auto-merge, automerge],
          }
        - {
            name: nouns,
            terms: [feedback, pr, review, merge, comments],
          }
      weight: 1.0
applicable_agents: [] # router-only; loop skill requiring /loop dynamic-mode engine
