triggers:
  command_prefixes:
    - "/gh-quick-wins"
  keywords:
    - { term: "quick-wins", weight: 1.0 }
    - { term: "quick wins", weight: 1.0 }
    - { term: "blast-radius", weight: 1.0 }
    - { term: "blast radius", weight: 1.0 }
    - { term: "knock out", weight: 0.5 }
    - { term: "actionable", weight: 0.5 }
    - { term: "low effort", weight: 0.5 }
    - { term: "easiest", weight: 0.5 }
    - { term: "backlog", weight: 0.25 }
    - { term: "triage", weight: 0.25 }
  keyword_groups:
    # AND-group: triage intent verb + backlog/issue noun.
    # Prevents over-firing on "show me the code" or "what's the status".
    - slots:
        - { name: verbs, terms: [show, what, knock, find, surface, pick] }
        - {
            name: nouns,
            terms: [wins, backlog, issues, candidates, actionable],
          }
      weight: 1.0
applicable_agents: [] # router-only; no sub-agents receive this skill
